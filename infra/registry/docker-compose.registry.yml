services:
  registry:
    image: registry:2
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # Keep it simple: HTTP on localhost.
      # If you want TLS/auth later, extend this compose file.
      - REGISTRY_STORAGE_DELETE_ENABLED=true
    volumes:
      - registry-data:/var/lib/registry

volumes:
  registry-data: {}
