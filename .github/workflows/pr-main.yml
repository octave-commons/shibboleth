name: PR to main

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: shibboleth-pr-main-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  promotion-guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PR_HEAD_REF: ${{ github.head_ref }}
    steps:
      - name: Require staging as merge source
        run: |
          if [ "$PR_HEAD_REF" != "staging" ]; then
            echo "::error::PRs into main must come from the staging branch. Current head: $PR_HEAD_REF"
            exit 1
          fi

  full-suite:
    runs-on: ubuntu-latest
    needs: promotion-guard
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@12.0
        with:
          cli: latest
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install UI dependencies
        run: npm --prefix ui ci
      - name: Run Clojure tests
        run: ./run-tests.sh
      - name: Build UI
        run: npm --prefix ui run build
      - name: Build control-plane container
        run: docker build -f Dockerfile.control-plane -t shibboleth-control-plane:test .
      - name: Build UI container
        run: docker build -f ui/Dockerfile -t shibboleth-ui:test ui